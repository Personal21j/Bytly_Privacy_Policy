<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="icon" type="image/png" href="{{ '/assets/icon.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/icon.png' | relative_url }}">
  <style>
    /* ===== Bytly palette (from constants/Colors.ts) ===== */
    :root {
      --brand:      #801423;  /* maroon */
      --gold:       #C3B391;  /* cream gold */
      --gold-ash:   #917D67;  /* golden ash */
      --bg:         #FAF9FB;
      --card:       #F5F3F7;
      --text:       #11181C;
      --muted:      #687076;
      --border:     #E5E1EB;
      --link:       #801423;
      --link-hover: #a01b2e;
      --heading:    #801423;
      --header-bg:  #801423;
      --header-fg:  #FAF9FB;
      --header-sub: #C3B391;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --brand:      #801423;
        --gold:       #C3B391;
        --gold-ash:   #917D67;
        --bg:         #1c1c1e;
        --card:       #2a2a2a;
        --text:       #ffffff;
        --muted:      #C3B391;
        --border:     #333333;
        --link:       #C3B391;
        --link-hover: #d8cbb0;
        --heading:    #C3B391;
        --header-bg:  #801423;
        --header-fg:  #ffffff;
        --header-sub: #C3B391;
      }
    }

    * { box-sizing: border-box; }

    html { -webkit-text-size-adjust: 100%; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                   Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji";
      line-height: 1.65;
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== Header band ===== */
    .site-header {
      background: var(--header-bg);
      color: var(--header-fg);
      padding: 40px 24px 36px;
      text-align: center;
    }
    .site-header img {
      width: 76px;
      height: 76px;
      border-radius: 18px;
      display: block;
      margin: 0 auto 16px;
      box-shadow: 0 4px 14px rgba(0,0,0,0.25);
    }
    .site-header .wordmark {
      margin: 0;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: var(--header-fg);
    }
    .site-header .subtitle {
      margin: 6px 0 0;
      font-size: 16px;
      font-weight: 500;
      color: var(--header-sub);
      letter-spacing: 0.3px;
    }

    /* ===== Content ===== */
    .content {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 24px 24px;
    }

    .content h1 {
      font-size: 26px;
      color: var(--heading);
      margin: 0 0 8px;
    }
    /* Section headings (## -> h2) */
    .content h2 {
      font-size: 21px;
      color: var(--heading);
      margin: 40px 0 12px;
      padding-left: 12px;
      border-left: 4px solid var(--gold);
      line-height: 1.3;
    }
    /* Sub-sections (### -> h3) */
    .content h3 {
      font-size: 17px;
      color: var(--gold-ash);
      margin: 24px 0 8px;
      text-transform: none;
    }

    .content p { margin: 0 0 18px; }

    .content em {
      color: var(--muted);
      font-style: italic;
    }

    .content ul {
      margin: 0 0 18px;
      padding-left: 22px;
    }
    .content li { margin: 0 0 10px; }
    .content li strong { color: var(--text); }

    .content a {
      color: var(--link);
      text-decoration: underline;
      text-underline-offset: 2px;
      word-break: break-word;
    }
    .content a:hover { color: var(--link-hover); }

    .content hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    img { max-width: 100%; height: auto; }

    /* ===== Footer ===== */
    .site-footer {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }
    .site-footer a { color: var(--link); }

    @media (max-width: 600px) {
      body { font-size: 16px; }
      .site-header { padding: 32px 18px 28px; }
      .site-header .wordmark { font-size: 26px; }
      .content { padding: 28px 18px 18px; }
      .content h2 { font-size: 19px; }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <img src="{{ '/assets/icon.png' | relative_url }}" alt="Bytly app icon">
    <p class="wordmark">Bytly</p>
    <p class="subtitle">Privacy Policy</p>
  </header>

  <main class="content">
    {{ content }}
  </main>

  <footer class="site-footer">
    &copy; {{ 'now' | date: "%Y" }} Bytly &middot;
    <a href="mailto:bytly.team@gmail.com">bytly.team@gmail.com</a>
  </footer>
</body>
</html>
